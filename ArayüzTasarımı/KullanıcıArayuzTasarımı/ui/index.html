<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vilagent — Desktop AI Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              base: "#0c1117",
              surface: "#111827",
              panel: "#161f2e",
              panelBright: "#1e2d42",
              border: "#1f2f45",
              accent: "#9ca3af",
              accentBright: "#e5e7eb",
              accentDim: "#6b7280",
            },
            boxShadow: {
              panel: "0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04)",
              glow: "0 0 0 1px rgba(45,212,191,0.3), 0 0 24px rgba(45,212,191,0.12)",
              msgAi: "0 2px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04)",
            },
          },
        },
      };
    </script>
    <style>
      * { font-family: "Inter", system-ui, sans-serif; }
      code, pre { font-family: "JetBrains Mono", monospace; }

      body {
        background: #0c1117;
        background-image:
          radial-gradient(ellipse 120% 60% at 10% 0%, rgba(20,184,166,0.10) 0%, transparent 55%),
          radial-gradient(ellipse 80% 50% at 90% 100%, rgba(13,148,136,0.07) 0%, transparent 50%);
      }

      .grid-lines {
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 20%, transparent 80%);
      }

      .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #2a3a52; border-radius: 9999px; }

      /* Thinking dots */
      .dot-pulse { animation: dotPulse 1.4s ease-in-out infinite; }
      .dot-pulse:nth-child(2) { animation-delay: 0.2s; }
      .dot-pulse:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dotPulse {
        0%,80%,100% { transform: scale(0.7); opacity: 0.3; }
        40%          { transform: scale(1.1); opacity: 1; }
      }

      /* Shimmer on thinking card */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer-bg {
        background: linear-gradient(90deg, transparent 0%, rgba(45,212,191,0.06) 50%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer 2s ease-in-out infinite;
      }

      /* Status badge pulse */
      @keyframes ping { 75%,100% { transform: scale(2); opacity: 0; } }
      .ping { animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite; }

      /* Slide-in panel */
      @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      .slide-in { animation: slideIn 0.22s ease-out; }

      /* Log row appear */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      .fade-up { animation: fadeUp 0.28s ease-out; }

      /* Glow on accent button */
      .btn-accent { box-shadow: 0 0 0 0 rgba(229,231,235,0.2); transition: box-shadow 0.2s; }
      .btn-accent:hover { box-shadow: 0 0 0 3px rgba(229,231,235,0.1); }

      /* Capability tag */
      .cap-tag {
        display: inline-flex; align-items: center; gap: 4px;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px; padding: 2px 8px;
        font-size: 10px; font-weight: 600; color: rgba(229,231,235,0.9);
        text-transform: uppercase; letter-spacing: .06em;
      }

      select option { background: #161f2e; }

      .code-line::before {
        content: attr(data-line);
        display: inline-block;
        width: 2rem;
        margin-right: 1rem;
        text-align: right;
        color: #4b5563;
        user-select: none;
      }
    </style>
  </head>

  <body class="text-gray-100 antialiased select-none">
    <div class="pointer-events-none fixed inset-0 grid-lines"></div>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useCallback, useEffect, useMemo, useRef, useState } = React;

      /* ─────────── constants ─────────── */
      const PROVIDERS = [
        { id: "openai", label: "OpenAI (ChatGPT)", tag: "Cloud API", requiresKey: true },
        { id: "gemini", label: "Google Gemini", tag: "Cloud API", requiresKey: true },
        { id: "claude", label: "Anthropic Claude", tag: "Cloud API", requiresKey: true },
        { id: "deepseek", label: "DeepSeek", tag: "Cloud API", requiresKey: true },
        { id: "grok", label: "xAI Grok", tag: "Cloud API", requiresKey: true },
        { id: "ollama", label: "Ollama (Local)", tag: "Local", requiresKey: false },
      ];

      const MODELS = [
        { id: "gpt-5.4", provider: "openai", label: "GPT-5.4", color: "text-gray-200" },
        { id: "gpt-5.4-pro", provider: "openai", label: "GPT-5.4 Pro", color: "text-gray-300" },
        { id: "o3", provider: "openai", label: "o3", color: "text-gray-300" },
        { id: "o4-mini", provider: "openai", label: "o4-mini", color: "text-gray-300" },
        { id: "gemini-2.5-pro", provider: "gemini", label: "Gemini 2.5 Pro", color: "text-gray-200" },
        { id: "gemini-2.5-flash", provider: "gemini", label: "Gemini 2.5 Flash", color: "text-gray-300" },
        { id: "claude-opus-4-6", provider: "claude", label: "Claude Opus 4.6", color: "text-gray-300" },
        { id: "claude-sonnet-4-6", provider: "claude", label: "Claude Sonnet 4.6", color: "text-gray-300" },
        { id: "claude-haiku-4-5", provider: "claude", label: "Claude Haiku 4.5", color: "text-gray-300" },
        { id: "deepseek-chat", provider: "deepseek", label: "DeepSeek Chat", color: "text-gray-300" },
        { id: "deepseek-reasoner", provider: "deepseek", label: "DeepSeek Reasoner", color: "text-gray-300" },
        { id: "grok-2", provider: "grok", label: "Grok 2", color: "text-gray-300" },
        { id: "grok-2-mini", provider: "grok", label: "Grok 2 mini", color: "text-gray-300" },
        { id: "llama3.1", provider: "ollama", label: "Llama 3.1", color: "text-gray-300" },
        { id: "qwen2.5", provider: "ollama", label: "Qwen 2.5", color: "text-gray-300" },
      ];

      const CAPABILITIES = ["File ops", "Shell", "Code gen", "Web search", "Vision", "Memory"];

      const HISTORY = [
        { id: 1, title: "Scaffold Python project",   time: "Today 14:02" },
        { id: 2, title: "Organize Downloads folder", time: "Today 13:45" },
        { id: 3, title: "Batch rename images",       time: "Yesterday" },
        { id: 4, title: "Git commit automation",     time: "Yesterday" },
      ];

      const DEMO_STEPS = [
        { icon: "✦", text: "Analyzing request intent…", delay: 0 },
        { icon: "◈", text: "Creating target directory structure…", delay: 320 },
        { icon: "◈", text: "Writing Python scaffold files…", delay: 640 },
        { icon: "▶", text: "Executing generated script…", delay: 960 },
        { icon: "✓", text: "Task completed successfully.", delay: 1280 },
      ];

      const DEFAULT_SETTINGS = {
        compactMode: false,
        showTimestamps: true,
        thinkingAnim: true,
        fadeMessages: true,
        delay: 1500,
        themePreset: "graphite",
        autoSaveChat: true,
        openaiApiKey: "",
        geminiApiKey: "",
        claudeApiKey: "",
        deepseekApiKey: "",
        grokApiKey: "",
        ollamaBaseUrl: "http://localhost:11434",
      };

      /* ─────────── helpers ─────────── */
      function clock() {
        return new Intl.DateTimeFormat("en", { hour: "2-digit", minute: "2-digit" }).format(new Date());
      }

      function IconTerminal() {
        return (
          <svg viewBox="0 0 24 24" className="h-full w-full" fill="none" stroke="currentColor" strokeWidth="1.75">
            <rect x="3" y="4" width="18" height="16" rx="2" />
            <path d="m7 9 3 3-3 3M13 15h4" />
          </svg>
        );
      }
      function IconSettings() {
        return (
          <svg viewBox="0 0 24 24" className="h-full w-full" fill="none" stroke="currentColor" strokeWidth="1.75">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        );
      }
      function IconHistory() {
        return (
          <svg viewBox="0 0 24 24" className="h-full w-full" fill="none" stroke="currentColor" strokeWidth="1.75">
            <path d="M12 8v5l3.5 2M3.05 11a9 9 0 1 1 .5 3.5" />
            <path d="M3 3v5h5" />
          </svg>
        );
      }
      function IconSend() {
        return (
          <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M4 12 20 4l-6 16-2.5-6.5L4 12Z" />
          </svg>
        );
      }
      function IconMic() {
        return (
          <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="1.75">
            <path d="M12 4a3 3 0 0 1 3 3v4a3 3 0 0 1-6 0V7a3 3 0 0 1 3-3Z" />
            <path d="M19 11a7 7 0 0 1-14 0M12 18v3M8.5 21h7" />
          </svg>
        );
      }
      function IconAttach() {
        return (
          <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="1.75">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48" />
          </svg>
        );
      }
      function IconClose() {
        return (
          <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        );
      }
      function IconChevronDown() {
        return (
          <svg viewBox="0 0 24 24" className="h-4 w-4" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="m6 9 6 6 6-6" />
          </svg>
        );
      }

      /* ─────────── SettingsPanel ─────────── */
      function SettingsPanel({ settings, provider, onChange, onClose, onReset }) {
        function toggle(key) { onChange({ ...settings, [key]: !settings[key] }); }

        return (
          <div className="absolute inset-0 z-30 flex justify-end">
            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={onClose} />
            <aside className="slide-in relative z-10 flex h-full w-full max-w-[360px] flex-col border-l border-border bg-panel shadow-panel">
              <div className="flex items-center justify-between border-b border-border px-5 py-4">
                <div>
                  <h2 className="text-sm font-semibold text-white">Settings</h2>
                  <p className="text-[11px] text-gray-500">Vilagent v1.0.0</p>
                </div>
                <button onClick={onClose} className="flex h-8 w-8 items-center justify-center rounded-lg border border-border text-gray-400 transition hover:border-gray-400/50 hover:text-gray-200">
                  <IconClose />
                </button>
              </div>

              <div className="scrollbar-thin flex-1 overflow-y-auto space-y-3 p-5">
                {/* Appearance */}
                <section>
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Appearance</p>
                  <div className="space-y-2 rounded-xl border border-border bg-surface/60 p-3">
                    {[
                      { key: "compactMode",   label: "Compact chat layout",   desc: "Reduce spacing between messages" },
                      { key: "showTimestamps", label: "Show timestamps",        desc: "Display send time on each message" },
                    ].map(({ key, label, desc }) => (
                      <label key={key} className="flex cursor-pointer items-center justify-between gap-3 rounded-lg px-2 py-2 transition hover:bg-white/[0.03]">
                        <div>
                          <p className="text-sm text-gray-200">{label}</p>
                          <p className="text-[11px] text-gray-500">{desc}</p>
                        </div>
                        <div
                          onClick={() => toggle(key)}
                          className={`relative h-5 w-9 cursor-pointer rounded-full transition-colors ${settings[key] ? "bg-gray-300" : "bg-gray-700"}`}
                        >
                          <span className={`absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform ${settings[key] ? "translate-x-4" : "translate-x-0.5"}`} />
                        </div>
                      </label>
                    ))}
                  </div>
                </section>

                {/* Animations */}
                <section>
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Animations</p>
                  <div className="space-y-2 rounded-xl border border-border bg-surface/60 p-3">
                    {[
                      { key: "thinkingAnim", label: "Thinking animation",   desc: "Animated dots while agent processes" },
                      { key: "fadeMessages", label: "Message fade-in",       desc: "Smooth entry for new messages" },
                    ].map(({ key, label, desc }) => (
                      <label key={key} className="flex cursor-pointer items-center justify-between gap-3 rounded-lg px-2 py-2 transition hover:bg-white/[0.03]">
                        <div>
                          <p className="text-sm text-gray-200">{label}</p>
                          <p className="text-[11px] text-gray-500">{desc}</p>
                        </div>
                        <div
                          onClick={() => toggle(key)}
                          className={`relative h-5 w-9 cursor-pointer rounded-full transition-colors ${settings[key] ? "bg-gray-300" : "bg-gray-700"}`}
                        >
                          <span className={`absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform ${settings[key] ? "translate-x-4" : "translate-x-0.5"}`} />
                        </div>
                      </label>
                    ))}
                  </div>
                </section>

                {/* Simulation */}
                <section>
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Simulation</p>
                  <div className="rounded-xl border border-border bg-surface/60 p-3">
                    <div className="flex items-center justify-between mb-2">
                      <p className="text-sm text-gray-200">Response delay</p>
                      <span className="rounded-md bg-white/10 px-2 py-0.5 font-mono text-xs text-gray-200">{settings.delay} ms</span>
                    </div>
                    <input
                      type="range" min="300" max="4000" step="100"
                      value={settings.delay}
                      onChange={(e) => onChange({ ...settings, delay: Number(e.target.value) })}
                      className="w-full accent-accent"
                    />
                    <div className="mt-1 flex justify-between text-[10px] text-gray-600">
                      <span>Fast (300ms)</span><span>Slow (4s)</span>
                    </div>
                  </div>
                </section>

                {/* Theme */}
                <section>
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Theme preset</p>
                  <div className="grid grid-cols-3 gap-2 rounded-xl border border-border bg-surface/60 p-3">
                    {[
                      ["graphite", "Graphite"],
                      ["contrast", "Contrast"],
                      ["soft", "Soft dark"],
                    ].map(([id, name]) => (
                      <button
                        key={id}
                        onClick={() => onChange({ ...settings, themePreset: id })}
                        className={`rounded-lg border px-2 py-1.5 text-[11px] transition ${settings.themePreset === id ? "border-gray-300 bg-white/10 text-white" : "border-border text-gray-400 hover:text-gray-200"}`}
                      >
                        {name}
                      </button>
                    ))}
                  </div>
                </section>

                {/* Session */}
                <section>
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Session</p>
                  <div className="space-y-2 rounded-xl border border-border bg-surface/60 p-3">
                    <label className="flex cursor-pointer items-center justify-between gap-3 rounded-lg px-2 py-2 transition hover:bg-white/[0.03]">
                      <div>
                        <p className="text-sm text-gray-200">Auto-save chat</p>
                        <p className="text-[11px] text-gray-500">Persist messages in local storage</p>
                      </div>
                      <div
                        onClick={() => toggle("autoSaveChat")}
                        className={`relative h-5 w-9 cursor-pointer rounded-full transition-colors ${settings.autoSaveChat ? "bg-gray-300" : "bg-gray-700"}`}
                      >
                        <span className={`absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform ${settings.autoSaveChat ? "translate-x-4" : "translate-x-0.5"}`} />
                      </div>
                    </label>
                    <button
                      onClick={onReset}
                      className="w-full rounded-lg border border-gray-500/40 px-3 py-2 text-xs font-semibold text-gray-200 transition hover:border-gray-300/70 hover:bg-white/5"
                    >
                      Reset all settings
                    </button>
                  </div>
                </section>

                {/* Provider config */}
                <section>
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Provider Configuration</p>
                  <div className="space-y-2 rounded-xl border border-border bg-surface/60 p-3">
                    <div className="rounded-lg bg-black/20 px-2.5 py-2 text-xs text-gray-400">
                      Active provider: <span className="font-semibold text-gray-200">{provider.label}</span>
                    </div>

                    {provider.id === "gemini" && (
                      <label className="block">
                        <span className="mb-1 block text-xs text-gray-400">Gemini API Key</span>
                        <input
                          type="password"
                          value={settings.geminiApiKey}
                          onChange={(e) => onChange({ ...settings, geminiApiKey: e.target.value })}
                          placeholder="AIza..."
                          className="w-full rounded-lg border border-border bg-base px-2.5 py-2 text-xs text-gray-100 outline-none focus:border-gray-300/60"
                        />
                      </label>
                    )}

                    {provider.id === "openai" && (
                      <label className="block">
                        <span className="mb-1 block text-xs text-gray-400">OpenAI API Key</span>
                        <input
                          type="password"
                          value={settings.openaiApiKey}
                          onChange={(e) => onChange({ ...settings, openaiApiKey: e.target.value })}
                          placeholder="sk-..."
                          className="w-full rounded-lg border border-border bg-base px-2.5 py-2 text-xs text-gray-100 outline-none focus:border-gray-300/60"
                        />
                      </label>
                    )}

                    {provider.id === "claude" && (
                      <label className="block">
                        <span className="mb-1 block text-xs text-gray-400">Claude API Key</span>
                        <input
                          type="password"
                          value={settings.claudeApiKey}
                          onChange={(e) => onChange({ ...settings, claudeApiKey: e.target.value })}
                          placeholder="sk-ant-..."
                          className="w-full rounded-lg border border-border bg-base px-2.5 py-2 text-xs text-gray-100 outline-none focus:border-gray-300/60"
                        />
                      </label>
                    )}

                    {provider.id === "deepseek" && (
                      <label className="block">
                        <span className="mb-1 block text-xs text-gray-400">DeepSeek API Key</span>
                        <input
                          type="password"
                          value={settings.deepseekApiKey}
                          onChange={(e) => onChange({ ...settings, deepseekApiKey: e.target.value })}
                          placeholder="sk-..."
                          className="w-full rounded-lg border border-border bg-base px-2.5 py-2 text-xs text-gray-100 outline-none focus:border-gray-300/60"
                        />
                      </label>
                    )}

                    {provider.id === "grok" && (
                      <label className="block">
                        <span className="mb-1 block text-xs text-gray-400">xAI API Key</span>
                        <input
                          type="password"
                          value={settings.grokApiKey}
                          onChange={(e) => onChange({ ...settings, grokApiKey: e.target.value })}
                          placeholder="xai-..."
                          className="w-full rounded-lg border border-border bg-base px-2.5 py-2 text-xs text-gray-100 outline-none focus:border-gray-300/60"
                        />
                      </label>
                    )}

                    {provider.id === "ollama" && (
                      <label className="block">
                        <span className="mb-1 block text-xs text-gray-400">Ollama Base URL</span>
                        <input
                          type="text"
                          value={settings.ollamaBaseUrl}
                          onChange={(e) => onChange({ ...settings, ollamaBaseUrl: e.target.value })}
                          placeholder="http://localhost:11434"
                          className="w-full rounded-lg border border-border bg-base px-2.5 py-2 text-xs text-gray-100 outline-none focus:border-gray-300/60"
                        />
                      </label>
                    )}
                  </div>
                </section>

                {/* About */}
                <section>
                  <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">About</p>
                  <div className="rounded-xl border border-border bg-surface/60 p-3 space-y-2">
                    {[
                      ["Project", "Vilagent Desktop"],
                      ["Version", "1.0.0"],
                      ["Stack", "Electron + React 18"],
                      ["UI", "Tailwind CSS CDN"],
                      ["Build", "electron-builder"],
                    ].map(([k, v]) => (
                      <div key={k} className="flex items-center justify-between text-xs">
                        <span className="text-gray-500">{k}</span>
                        <span className="font-medium text-gray-200">{v}</span>
                      </div>
                    ))}
                  </div>
                </section>
              </div>
            </aside>
          </div>
        );
      }

      /* ─────────── UserMessage ─────────── */
      function UserMessage({ msg, showTime, animate }) {
        return (
          <div className={`${animate ? "fade-up" : ""} ml-auto flex max-w-[80%] flex-col items-end gap-1`}>
            <div className="rounded-2xl rounded-tr-sm bg-gradient-to-br from-gray-200 to-gray-400 px-4 py-3 text-sm font-medium text-black shadow-glow">
              {msg.text}
            </div>
            {showTime && <span className="text-[10px] text-gray-600 pr-1">{clock()}</span>}
          </div>
        );
      }

      /* ─────────── AgentMessage ─────────── */
      function AgentMessage({ msg, showTime, animate }) {
        const [open, setOpen] = useState(true);

        return (
          <div className={`${animate ? "fade-up" : ""} flex max-w-[90%] flex-col gap-2`}>
            {/* Header */}
            <div className="flex items-center gap-2">
              <div className="flex h-7 w-7 items-center justify-center rounded-lg bg-white/10 text-gray-200 ring-1 ring-white/15">
                <div className="h-4 w-4"><IconTerminal /></div>
              </div>
              <span className="text-xs font-semibold text-white">Vilagent</span>
              <span className="rounded-full bg-white/10 px-2 py-0.5 text-[9px] font-semibold uppercase tracking-wide text-gray-300 ring-1 ring-white/15">Agent</span>
              {showTime && <span className="ml-auto text-[10px] text-gray-600">{clock()}</span>}
            </div>

            {/* Bubble */}
            <div className="rounded-2xl rounded-tl-sm border border-border bg-panel shadow-msgAi">
              <div className="px-4 py-3 text-sm leading-relaxed text-gray-200">{msg.text}</div>

              {/* Steps */}
              {msg.steps && (
                <div className="border-t border-border px-4 py-3 space-y-1.5">
                  <button onClick={() => setOpen(o => !o)} className="flex w-full items-center gap-2 text-[11px] font-semibold uppercase tracking-wider text-gray-500 hover:text-gray-300 transition">
                    <span>Execution log</span>
                    <span className={`transition-transform ${open ? "rotate-180" : ""}`}><IconChevronDown /></span>
                    <span className="ml-auto rounded bg-white/10 px-1.5 py-0.5 text-[9px] font-bold text-gray-300">DONE</span>
                  </button>
                  {open && (
                    <div className="mt-2 space-y-1">
                      {msg.steps.map((step, i) => (
                        <div key={i} className="flex items-start gap-2.5 rounded-lg bg-black/20 px-2.5 py-1.5 text-xs">
                          <span className={`mt-0.5 font-mono font-bold ${i === msg.steps.length - 1 ? "text-gray-200" : "text-gray-400"}`}>{step.icon}</span>
                          <span className="text-gray-300">{step.text}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

            </div>
          </div>
        );
      }

      /* ─────────── ThinkingBubble ─────────── */
      function ThinkingBubble({ animated, animate }) {
        return (
          <div className={`${animate ? "fade-up" : ""} flex max-w-[90%] flex-col gap-2`}>
            <div className="flex items-center gap-2">
              <div className="flex h-7 w-7 items-center justify-center rounded-lg bg-white/10 text-gray-200 ring-1 ring-white/15">
                <div className="h-4 w-4"><IconTerminal /></div>
              </div>
              <span className="text-xs font-semibold text-white">Vilagent</span>
            </div>
            <div className="shimmer-bg rounded-2xl rounded-tl-sm border border-border bg-panel px-4 py-3 shadow-msgAi">
              <div className="flex items-center gap-3">
                <div className="flex gap-1">
                  {[0,1,2].map(i => (
                    <span key={i} className={`h-2 w-2 rounded-full bg-gray-300 ${animated ? "dot-pulse" : "opacity-50"}`}></span>
                  ))}
                </div>
                <span className="text-xs text-gray-400">Processing your request…</span>
              </div>
            </div>
          </div>
        );
      }

      /* ─────────── Main App ─────────── */
      function App() {
        const [providerId, setProviderId] = useState("gemini");
        const [modelId, setModelId]       = useState("gemini-2.5-pro");
        const [input, setInput]           = useState("");
        const [thinking, setThinking]     = useState(false);
        const [settingsOpen, setSettings] = useState(false);
        const [activeTab, setActiveTab]   = useState("chat"); // "chat" | "history"
        const [settings, setSettings_]   = useState(DEFAULT_SETTINGS);
        const [messages, setMessages]     = useState([
          {
            id: 1, role: "assistant", type: "welcome",
            text: "Hi — I'm Vilagent, your desktop AI agent. I can scaffold projects, run commands, generate code, and automate repetitive computer tasks. What would you like me to do?",
          },
        ]);

        const chatRef = useRef(null);
        const provider = useMemo(() => PROVIDERS.find((p) => p.id === providerId) || PROVIDERS[0], [providerId]);
        const providerModels = useMemo(() => MODELS.filter((m) => m.provider === providerId), [providerId]);
        const model   = useMemo(() => MODELS.find(m => m.id === modelId), [modelId]);

        useEffect(() => {
          if (!providerModels.some((m) => m.id === modelId) && providerModels[0]) {
            setModelId(providerModels[0].id);
          }
        }, [providerModels, modelId]);

        useEffect(() => {
          try {
            const savedSettings = localStorage.getItem("vilagent.settings");
            if (savedSettings) setSettings_({ ...DEFAULT_SETTINGS, ...JSON.parse(savedSettings) });

            const savedMessages = localStorage.getItem("vilagent.messages");
            if (savedMessages) setMessages(JSON.parse(savedMessages));
          } catch (error) {
            console.error("Failed to restore session:", error);
          }
        }, []);

        useEffect(() => {
          try {
            localStorage.setItem("vilagent.settings", JSON.stringify(settings));
          } catch (error) {
            console.error("Failed to save settings:", error);
          }
        }, [settings]);

        useEffect(() => {
          try {
            if (settings.autoSaveChat) {
              localStorage.setItem("vilagent.messages", JSON.stringify(messages));
            } else {
              localStorage.removeItem("vilagent.messages");
            }
          } catch (error) {
            console.error("Failed to save messages:", error);
          }
        }, [messages, settings.autoSaveChat]);

        useEffect(() => {
          if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
        }, [messages, thinking]);

        function onProvider(e) {
          const next = e.target.value;
          setProviderId(next);
          console.log("Selected provider:", PROVIDERS.find((p) => p.id === next)?.label);
        }

        function onModel(e) {
          const next = e.target.value;
          setModelId(next);
          console.log("Selected model:", MODELS.find(m => m.id === next)?.label);
        }

        function newChat() {
          setMessages([{
            id: Date.now(), role: "assistant", type: "welcome",
            text: "New session started. Ready for your next task.",
          }]);
        }

        function send(e) {
          e.preventDefault();
          const text = input.trim();
          if (!text || thinking) return;
          setMessages(p => [...p, { id: Date.now(), role: "user", type: "text", text }]);
          setInput("");
          setThinking(true);

          setTimeout(() => {
            setThinking(false);
            setMessages(p => [...p, {
              id: Date.now() + 1,
              role: "assistant",
              type: "rich",
              text: "I've analyzed your request and executed the task. Here's a summary of what was done:",
              steps: DEMO_STEPS,
            }]);
          }, settings.delay);
        }

        function resetAllSettings() {
          setSettings_(DEFAULT_SETTINGS);
        }

        return (
          <div className="min-h-screen p-3 sm:p-4">
            <div className={`mx-auto flex min-h-[calc(100vh-1.5rem)] max-w-[1600px] overflow-hidden rounded-2xl border border-white/[0.07] shadow-panel backdrop-blur-sm ${
              settings.themePreset === "contrast"
                ? "bg-black"
                : settings.themePreset === "soft"
                ? "bg-slate-900/70"
                : "bg-surface/40"
            }`}>

              {/* ── Sidebar ── */}
              <aside className="relative z-10 flex w-[4.5rem] shrink-0 flex-col border-r border-border bg-panel sm:w-[280px]">

                {/* Logo */}
                <div className="flex items-center gap-3 border-b border-border p-3 sm:p-4">
                  <div className="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-gradient-to-br from-white/20 to-white/5 text-gray-200 ring-1 ring-white/15 shadow-glow">
                    <div className="h-5 w-5"><IconTerminal /></div>
                  </div>
                  <div className="hidden sm:block">
                    <p className="text-base font-bold tracking-tight text-white">Vilagent</p>
                    <p className="text-[11px] font-medium text-gray-400 uppercase tracking-wider">Desktop Agent</p>
                  </div>
                </div>

                {/* New chat */}
                <div className="p-2 sm:p-3">
                  <button onClick={newChat} className="btn-accent w-full rounded-xl bg-gradient-to-r from-gray-200 to-gray-400 px-3 py-2.5 text-sm font-semibold text-black transition hover:from-white hover:to-gray-300">
                    <span className="hidden sm:inline">+ New conversation</span>
                    <span className="sm:hidden text-lg">+</span>
                  </button>
                </div>

                {/* Tabs */}
                <div className="hidden sm:flex gap-1 px-3 mb-2">
                  {["chat","history"].map(t => (
                    <button key={t} onClick={() => setActiveTab(t)}
                      className={`flex-1 rounded-lg py-1.5 text-xs font-semibold capitalize transition ${activeTab === t ? "bg-panelBright text-white" : "text-gray-500 hover:text-gray-300"}`}>
                      {t}
                    </button>
                  ))}
                </div>

                <div className="scrollbar-thin flex-1 overflow-y-auto px-2 sm:px-3">

                  {activeTab === "chat" ? (
                    <>
                      {/* Provider / model selection */}
                      <div className="mb-3 rounded-xl border border-border bg-surface/70 p-3">
                        <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Provider</p>
                        <select value={providerId} onChange={onProvider}
                          className="w-full rounded-lg border border-border bg-base px-2.5 py-2 text-xs text-gray-100 outline-none focus:border-gray-300/70 cursor-pointer">
                          {PROVIDERS.map(p => (
                            <option key={p.id} value={p.id}>{p.label} · {p.tag}</option>
                          ))}
                        </select>
                        <p className="mb-2 mt-3 text-[10px] font-bold uppercase tracking-widest text-gray-500">Model</p>
                        <select value={modelId} onChange={onModel}
                          className="w-full rounded-lg border border-border bg-base px-2.5 py-2 text-xs text-gray-100 outline-none focus:border-gray-300/70 cursor-pointer">
                          {providerModels.map(m => (
                            <option key={m.id} value={m.id}>{m.label}</option>
                          ))}
                        </select>
                        {model && provider && (
                          <div className="mt-2 flex items-center gap-2">
                            <span className={`text-[11px] font-semibold ${model.color}`}>{model.label}</span>
                            <span className="rounded bg-white/5 px-1.5 py-0.5 text-[9px] font-bold uppercase tracking-wide text-gray-500">{provider.tag}</span>
                          </div>
                        )}
                      </div>

                      {/* Agent status */}
                      <div className="mb-3 rounded-xl border border-border bg-surface/70 p-3">
                        <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Agent Status</p>
                        <div className="space-y-2">
                          <div className="flex items-center justify-between">
                            <span className="text-xs text-gray-400">Connection</span>
                            <div className="flex items-center gap-1.5">
                              <span className="relative flex h-2 w-2">
                                <span className="ping absolute inline-flex h-full w-full rounded-full bg-gray-300 opacity-50"></span>
                                <span className="relative inline-flex h-2 w-2 rounded-full bg-gray-300"></span>
                              </span>
                              <span className="text-xs text-gray-300 font-medium">Online</span>
                            </div>
                          </div>
                          <div className="flex items-center justify-between">
                            <span className="text-xs text-gray-400">Mode</span>
                            <span className="rounded-full bg-white/10 px-2 py-0.5 text-[10px] font-semibold text-gray-300 ring-1 ring-white/15">{provider.id === "ollama" ? "Local" : "Cloud"}</span>
                          </div>
                          <div className="flex items-center justify-between">
                            <span className="text-xs text-gray-400">Messages</span>
                            <span className="text-xs font-semibold text-gray-200">{messages.length}</span>
                          </div>
                          <div className="flex items-center justify-between">
                            <span className="text-xs text-gray-400">Delay</span>
                            <span className="font-mono text-xs text-gray-300">{settings.delay}ms</span>
                          </div>
                        </div>
                      </div>

                      {/* Capabilities */}
                      <div className="mb-3 rounded-xl border border-border bg-surface/70 p-3">
                        <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Capabilities</p>
                        <div className="flex flex-wrap gap-1.5">
                          {CAPABILITIES.map(c => (
                            <span key={c} className="cap-tag">{c}</span>
                          ))}
                        </div>
                      </div>
                    </>
                  ) : (
                    /* History tab */
                    <div className="space-y-1">
                      <p className="mb-2 text-[10px] font-bold uppercase tracking-widest text-gray-500">Recent sessions</p>
                      {HISTORY.map(h => (
                        <button key={h.id} className="w-full rounded-xl border border-transparent px-3 py-2.5 text-left transition hover:border-border hover:bg-panelBright/60">
                          <p className="truncate text-xs font-medium text-gray-200">{h.title}</p>
                          <p className="text-[10px] text-gray-600 mt-0.5">{h.time}</p>
                        </button>
                      ))}
                    </div>
                  )}
                </div>

                {/* Bottom nav */}
                <div className="border-t border-border p-2 sm:p-3 space-y-1">
                  <button onClick={() => setSettings(true)}
                    className="flex w-full items-center gap-3 rounded-xl border border-transparent px-2 py-2.5 text-left transition hover:border-border hover:bg-panelBright/60">
                    <span className="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-surface text-gray-400 transition group-hover:text-gray-100">
                      <div className="h-4 w-4"><IconSettings /></div>
                    </span>
                    <span className="hidden text-sm font-medium text-gray-300 sm:block">Settings</span>
                  </button>
                </div>
              </aside>

              {/* ── Main chat ── */}
              <main className="relative flex min-w-0 flex-1 flex-col">

                {/* Header */}
                <header className="flex shrink-0 items-center justify-between border-b border-border bg-panel/50 px-4 py-3 backdrop-blur sm:px-6">
                  <div className="flex items-center gap-3">
                    <div className="hidden items-center gap-1.5 sm:flex">
                      <span className="h-3 w-3 rounded-full bg-red-400/70"></span>
                      <span className="h-3 w-3 rounded-full bg-yellow-400/70"></span>
                      <span className="h-3 w-3 rounded-full bg-gray-300/70"></span>
                    </div>
                    <div className="h-4 w-px bg-white/10 hidden sm:block"></div>
                    <h1 className="text-sm font-semibold text-white sm:text-base">AI Agent Control Panel</h1>
                    <span className="hidden rounded-md bg-white/10 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider text-gray-200 ring-1 ring-white/15 sm:inline">Vilagent</span>
                  </div>
                  <div className="flex items-center gap-2">
                    {model && (
                      <span className={`hidden text-xs font-medium sm:block ${model.color}`}>{model.label}</span>
                    )}
                    <div className="flex items-center gap-1.5 rounded-full border border-white/15 bg-white/5 px-3 py-1.5">
                      <span className="relative flex h-2 w-2">
                        <span className="ping absolute inline-flex h-full w-full rounded-full bg-gray-300 opacity-50"></span>
                        <span className="relative inline-flex h-2 w-2 rounded-full bg-gray-300"></span>
                      </span>
                      <span className="text-[11px] font-medium text-gray-200">Connected</span>
                    </div>
                  </div>
                </header>

                {/* Messages */}
                <section
                  ref={chatRef}
                  className={`scrollbar-thin flex-1 overflow-y-auto px-4 sm:px-8 ${settings.compactMode ? "space-y-3 py-4" : "space-y-5 py-5"} pb-32`}
                >
                  {messages.map(msg => (
                    msg.role === "user"
                      ? <UserMessage key={msg.id} msg={msg} showTime={settings.showTimestamps} animate={settings.fadeMessages} />
                      : <AgentMessage key={msg.id} msg={msg} showTime={settings.showTimestamps} animate={settings.fadeMessages} />
                  ))}
                  {thinking && <ThinkingBubble animated={settings.thinkingAnim} animate={settings.fadeMessages} />}
                </section>

                {/* Input bar */}
                <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-surface via-surface/90 to-transparent px-4 pb-4 pt-8 sm:px-6">
                  <form onSubmit={send}
                    className="mx-auto flex max-w-4xl items-end gap-2 rounded-2xl border border-border bg-panel/95 p-2 shadow-panel backdrop-blur-md">
                    <button type="button"
                      className="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl border border-border bg-surface text-gray-400 transition hover:border-gray-300/50 hover:text-gray-100"
                      title="Attach file">
                      <IconAttach />
                    </button>
                    <textarea
                      value={input}
                      onChange={e => { setInput(e.target.value); e.target.style.height = "auto"; e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px"; }}
                      onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(e); }}}
                      placeholder={`Message ${model?.label ?? "Vilagent"}… (Enter to send)`}
                      rows={1}
                      className="scrollbar-thin min-h-[44px] flex-1 resize-none rounded-xl border border-border bg-base px-3 py-3 text-sm text-gray-100 outline-none placeholder:text-gray-600 focus:border-gray-300/60 transition"
                      style={{ overflow: "hidden" }}
                    />
                    <button type="button"
                      className="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl border border-border bg-surface text-gray-400 transition hover:border-gray-300/50 hover:text-gray-100"
                      title="Voice input">
                      <IconMic />
                    </button>
                    <button type="submit"
                      disabled={thinking || !input.trim()}
                      className="btn-accent flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-gradient-to-br from-gray-200 to-gray-400 text-black transition hover:from-white hover:to-gray-300 disabled:cursor-not-allowed disabled:opacity-40">
                      <IconSend />
                    </button>
                  </form>
                  <p className="mt-2 text-center text-[10px] text-gray-700">
                    Vilagent simulates agent behavior locally · No real API calls are made
                  </p>
                </div>

                {/* Settings overlay */}
                {settingsOpen && (
                  <SettingsPanel settings={settings} provider={provider} onChange={setSettings_} onClose={() => setSettings(false)} onReset={resetAllSettings} />
                )}
              </main>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
